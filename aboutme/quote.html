    <style>
        .container__quote {
            background-color: rgb(105, 105, 213);
            width: 50%;
            height: 180px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content:baseline;
            padding: 20px;
            margin: 15px auto;
            border: 3px solid rgb(38, 31, 90);
            border-style: outset;
            border-radius: 50px;
            
        }
        
        .quote__heading {
            text-align: center;
            margin-bottom: 40px;
        }

        .custom__line {
            font-size: 24px;
            font-style: italic;
            text-align: center;
            position: relative;
            padding: 20px 40px;
        }

        .custom__line::before {
            content: "❝";
            font-size: 60px;
            position: absolute;
            left: 0;
            top: -10px;
            color: #31285f;
        }

        .custom__line::after {
            content: "❞";
            font-size: 60px;
            position: absolute;
            right: 0;
            bottom: -30px;
            color: #31285f;
        }

    </style>
</head>

        </div>

        <!-- life quote within container -->
        <div class="container__quote">
            <div>
                <h2 class="quote__heading">MY LIFE QUOTE</h2>
                <p>
                    <span class="custom__line">Strive not to be a success, but rather to be of value.</span>
                </p>
            </div>
        </div>
    </section>
