            margin: auto;
            margin-top: 15px;
            margin-bottom: 30px;
        }

        }

            color: rgb(33, 15, 70);
        }

        .button__items {
            background-color: #ffecfc;
            color: rgb(41, 38, 82);
            border: none;
            border-radius: 12px;
            padding: 8px 15px;
            margin: 10px 2px;
            text-align: center;
            display: inline-block;
            font-size: 14px;
            transition-duration: 0.4s;
            cursor: pointer;
        }

        .button__items:hover {
            background-color: rgb(94, 116, 177);
            color: rgb(215, 215, 250);

        }
    </style>
</head>
